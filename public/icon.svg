<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Neon Indigo/Purple Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Glowing Emerald Green Gradient -->
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Subtle Glow Filters -->
    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base (Rounded to look great as an app icon) -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Outer Sci-Fi Cyber Grid Lines -->
  <g opacity="0.15">
    <line x1="64" y1="0" x2="64" y2="512" stroke="#6366f1" stroke-width="2" />
    <line x1="128" y1="0" x2="128" y2="512" stroke="#6366f1" stroke-width="2" />
    <line x1="256" y1="0" x2="256" y2="512" stroke="#6366f1" stroke-width="2" />
    <line x1="384" y1="0" x2="384" y2="512" stroke="#6366f1" stroke-width="2" />
    <line x1="448" y1="0" x2="448" y2="512" stroke="#6366f1" stroke-width="2" />

    <line x1="0" y1="64" x2="512" y2="64" stroke="#6366f1" stroke-width="2" />
    <line x1="0" y1="128" x2="512" y2="128" stroke="#6366f1" stroke-width="2" />
    <line x1="0" y1="256" x2="512" y2="256" stroke="#6366f1" stroke-width="2" />
    <line x1="0" y1="384" x2="512" y2="384" stroke="#6366f1" stroke-width="2" />
    <line x1="0" y1="448" x2="512" y2="448" stroke="#6366f1" stroke-width="2" />
  </g>

  <!-- Glowing Circular Cyber Rim -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#accent-grad)" stroke-width="6" filter="url(#glow-subtle)" opacity="0.8" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="16 24" opacity="0.4" />

  <!-- Brain Core & Code Nodes Symbol -->
  <g filter="url(#glow-heavy)">
    <!-- Circuit connections (background paths) -->
    <path d="M176,256 L256,176 L336,256 L256,336 Z" fill="none" stroke="url(#accent-grad)" stroke-width="4" opacity="0.6" />
    <path d="M128,256 L256,128 L384,256 L256,384 Z" fill="none" stroke="url(#accent-grad)" stroke-width="2" stroke-dasharray="8 8" opacity="0.4" />

    <!-- Central Binary Matrix & Brain/Mind abstraction -->
    <!-- Left hemisphere -->
    <path d="M220,180 C180,180 150,210 150,250 C150,285 175,305 200,320 C210,326 215,335 215,345 L215,360 L240,360 L240,180 Z" fill="url(#accent-grad)" opacity="0.85" />
    <!-- Right hemisphere -->
    <path d="M292,180 C332,180 362,210 362,250 C362,285 337,305 312,320 C302,326 297,335 297,345 L297,360 L272,360 L272,180 Z" fill="url(#accent-grad)" opacity="0.85" />

    <!-- Glowing Codebreaking Nodes -->
    <!-- Node A (Top-Left) -->
    <circle cx="190" cy="210" r="14" fill="#ffffff" stroke="#a855f7" stroke-width="4" />
    <!-- Node B (Top-Right) -->
    <circle cx="322" cy="210" r="14" fill="#ffffff" stroke="#a855f7" stroke-width="4" />
    <!-- Node 1 (Center Left) -->
    <circle cx="150" cy="256" r="16" fill="url(#emerald-grad)" stroke="#ffffff" stroke-width="3" />
    <text x="150" y="262" font-family="monospace" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle">1</text>

    <!-- Node A (Center Right) -->
    <circle cx="362" cy="256" r="16" fill="url(#emerald-grad)" stroke="#ffffff" stroke-width="3" />
    <text x="362" y="262" font-family="monospace" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle">A</text>

    <!-- Node 2 (Bottom Left) -->
    <circle cx="190" cy="310" r="14" fill="#ffffff" stroke="#6366f1" stroke-width="4" />
    <!-- Node B (Bottom Right) -->
    <circle cx="322" cy="310" r="14" fill="#ffffff" stroke="#6366f1" stroke-width="4" />
  </g>

  <!-- Tech Overlay Text details: "01" and "AB" in subtle font -->
  <text x="256" y="280" font-family="system-ui, sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#glow-subtle)">1A2B</text>
  <text x="256" y="440" font-family="monospace" font-size="14" font-weight="700" fill="#6366f1" text-anchor="middle" letter-spacing="8" opacity="0.7">CIPHER MIND</text>

  <!-- Glowing Core Light -->
  <circle cx="256" cy="256" r="28" fill="#ffffff" filter="url(#glow-heavy)" />
  <circle cx="256" cy="256" r="10" fill="url(#emerald-grad)" />
</svg>
